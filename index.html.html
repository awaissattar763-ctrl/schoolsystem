.ni{display:flex;align-items:center;gap:8px;padding:9px 15px;cursor:pointer;font-size:12.5px;color:var(--mt);border-left:3px solid transparent;transition:all .15s;}

.pdot{width:6px;height:6px;background:var(--ac3);border-radius:50%;display:inline-block;animation:pu 1.8s infinite;margin-right:4px;}
